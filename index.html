    /* 核心優化：允許滾動，但徹底隱藏滾動條（滑桿），並確保不晃動 */
    html, body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: transparent; 
      margin: 0;
      padding: 0;
      overflow-x: hidden; /* 防止左右晃動 */
      overflow-y: auto;   /* 允許上下滾動 */
      
      /* 針對 IE、Edge 和 Firefox 隱藏滾動條 */
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
      -webkit-font-smoothing: antialiased;
    }

    /* 針對 Chrome、Safari 和 Opera 隱藏滾動條 */
    html::-webkit-scrollbar, body::-webkit-scrollbar {
      display: none;
    }

    /* 主卡片改為深紫漸層與厚白邊框樣式 */
    .mega-course-card {
      background: linear-gradient(to bottom right, #5b4a9a, #3a2e66); 
      border: 4px solid #ffffff; 
      border-radius: 2.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px -10px rgba(72, 58, 122, 0.5); 
      transition: all 0.3s ease;
    }

    .mega-course-card:hover {
      box-shadow: 0 25px 50px -10px rgba(72, 58, 122, 0.7);
    }

    /* 跑馬燈光束閃過效果 */
    .shine::after {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(255, 255, 255, 0.25) 50%,
        transparent 100%
      );
      transform: skewX(-25deg);
      pointer-events: none;
      z-index: 5;
      animation: shine-effect 5s ease-in-out infinite;
    }

    @keyframes shine-effect {
      0% { left: -150%; }
      20%, 100% { left: 150%; }
    }

    /* 呼吸按鈕動畫 - 增加點擊衝動 */

      align-items: center;
      justify-content: center;
    }

    .btn-action:hover {
      background: linear-gradient(to bottom, #fef08a, #fbbf24);
      transform: scale(1.03);
      box-shadow: 0 15px 25px -5px rgba(251, 191, 36, 0.6);
    }

    /* ==================== 參考語法的極致防滑桿輪播結構 ==================== */
    .carousel-container {
      position: relative;
      width: 100%;
      overflow: hidden;
      padding-bottom: 4px;
      margin-bottom: -4px;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      width: 100%;
    }

    .carousel-slide {
      width: 100%;
      flex-shrink: 0;
      padding: 4px;
    }

    /* 手機版輪播特定結構：僅在 md (768px) 以下生效，避免裁切與滑動溢出 */
    @media (max-width: 767px) {

        position: relative;

        padding-bottom: 4px;
      }
      .mobile-carousel-track {

        width: 100%;
      }
      .mobile-carousel-slide {
        width: 100%;
        flex-shrink: 0;
        padding: 4px;
      }
    }
  </style>

  <!-- 貼心一鍵複製代碼與輪播手勢腳本 -->
  <script>
    // --- 輪播一：雙課大禮包輪播控制機制 (僅在非 md 電腦版寬度下生效) ---
    let currentSlide = 0;
    const totalSlides = 2;

    function updateCarousel() {
      // 如果視窗寬度大於等於 768px (md)，不執行輪播位移，強制重設回歸 grid 並排
      if (window.innerWidth >= 768) {
        document.getElementById('carousel-track').style.transform = 'none';
        return;
      }

      const track = document.getElementById('carousel-track');
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      
      // 更新圓點樣式
      const dots = document.querySelectorAll('#carouselDots span');
      dots.forEach((dot, index) => {
        if (index === currentSlide) {
          dot.classList.remove('bg-white/30');
          dot.classList.add('bg-yellow-400', 'w-3');
        } else {
          dot.classList.remove('bg-yellow-400', 'w-3');
          dot.classList.add('bg-white/30', 'w-2');
        }
      });
    }

    // 監聽視窗縮放，確保在桌機/手機切換時顯示正常
    window.addEventListener('resize', updateCarousel);

    function nextSlide() {
      if (window.innerWidth >= 768) return;
      currentSlide = (currentSlide + 1) % totalSlides;
      updateCarousel();
    }

    function prevSlide() {
      if (window.innerWidth >= 768) return;
      currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
      updateCarousel();
    }

    function goToSlide(index) {
      if (window.innerWidth >= 768) return;
      currentSlide = index;
      updateCarousel();
    }

    // --- 舊圖像、字卡的 onerror Fallback 機制 ---
    const allImages = document.querySelectorAll('img');
    allImages.forEach(img => {
      img.addEventListener('error', function() {
        if (this.alt === "注音海報") {
          this.src = 'https://images.unsplash.com/photo-1544377193-33dcf4d68fb5?auto=format&fit=crop&w=300&q=80';
        }
      });
    });

    // --- 手勢觸控滑動支援 (與參考語法的流暢性與物理碰撞機制一致) ---
    let startX = 0;
    let startY = 0;
    let isDragging = false;
    const track = document.getElementById('carousel-track');

    track.addEventListener('touchstart', (e) => {
      if (window.innerWidth >= 768) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      isDragging = true;
    }, { passive: true });

    track.addEventListener('touchend', (e) => {
      if (!isDragging || window.innerWidth >= 768) return;
      const endX = e.changedTouches[0].clientX;
      const endY = e.changedTouches[0].clientY;
      
      const diffX = startX - endX;
      const diffY = startY - endY;

      // 關鍵優化：只有當「左右滑動距離大於上下滑動距離」時，才執行輪播換頁，不干擾上下捲頁
      if (Math.abs(diffX) > Math.abs(diffY)) {
        if (diffX > 40) {
          nextSlide();
        } else if (diffX < -40) {
          prevSlide();
        }
      }
      isDragging = false;
    }, { passive: true });

    // --- 一鍵複製折價券腳本 ---
    function copyCouponCode(code) {
      const tempTextArea = document.createElement('textarea');
      tempTextArea.value = code;
      tempTextArea.style.position = 'fixed'; 
      tempTextArea.style.opacity = '0';
      document.body.appendChild(tempTextArea);
      tempTextArea.select();
      
      try {
        const successful = document.execCommand('copy');
        if (successful) {
          const couponBtn = document.getElementById('coupon-btn');
          const originalHTML = couponBtn.innerHTML;
          
          couponBtn.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-400 mr-1"></i> 已複製代碼！`;
          couponBtn.className = "inline-flex items-center justify-center text-xs sm:text-sm text-emerald-400 bg-emerald-500/10 border border-emerald-500/30 font-bold tracking-wide px-3.5 py-2 rounded-full shadow-sm transition-all w-fit mx-auto sm:mx-0";
          
          setTimeout(() => {
            couponBtn.innerHTML = originalHTML;
            couponBtn.className = "cursor-pointer group flex items-center justify-center gap-1.5 bg-white/10 border border-white/20 hover:bg-white/15 px-3.5 py-2 rounded-full text-xs sm:text-sm text-white font-bold active:scale-95 transition-all w-fit mx-auto sm:mx-0 shrink-0";
          }, 2000);
        }
      } catch (err) {
        console.error('複製失敗: ', err);
      } finally {
        document.body.removeChild(tempTextArea);
      }
    }
  </script>

</body>
</html>
